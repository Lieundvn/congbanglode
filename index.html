<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý & Tính Lô Đề (Cloud)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { background-color: #f3f4f6; font-family: Arial, sans-serif; }
        .mono { font-family: ui-monospace, monospace; }
        .tab-container { margin-bottom: 20px; }
        .tab { overflow: hidden; border: 1px solid #ccc; background-color: #e9ecef; border-radius: 5px 5px 0 0; }
        .tab button { background-color: inherit; float: left; border: none; outline: none; cursor: pointer; padding: 14px 20px; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .tab button:hover { background-color: #ddd; }
        .tab button.active { background-color: #4f46e5; color: white; }
        .tabcontent { display: none; padding: 20px; border: 1px solid #ccc; border-top: none; background-color: white; border-radius: 0 0 5px 5px; min-height: 500px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);}
        
        .table-responsive { overflow-x: auto; margin-top: 15px; }
        table.debt-table { border-collapse: collapse; width: 100%; min-width: 650px; }
        table.debt-table th, table.debt-table td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        table.debt-table th { background-color: #f8f9fa; position: sticky; top: 0; }
        
        .col-name { min-width: 150px; text-align: left; font-weight: bold; cursor: pointer; color: #4f46e5; }
        .col-name:hover { text-decoration: underline; color: #3730a3; }
        .day-input { width: 100px; padding: 8px; text-align: right; border: 1px solid #ccc; border-radius: 3px; font-size: 15px; font-weight: bold; outline: none; transition: 0.2s;}
        .day-input:focus { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.3); }
        .col-total { font-weight: bold; font-size: 16px;}
        .col-old-debt { font-weight: bold; }
        .today-col { background-color: #e0e7ff !important; border-bottom: 2px solid #4f46e5; }
        textarea:focus { outline: none; box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.5); border-color: #6366f1; }
        
        #cloudStatus { position: fixed; bottom: 10px; right: 10px; background: #10b981; color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); display: none; z-index: 9999;}
        #loadingScreen { position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 9998; display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; color: #4f46e5; }
    </style>
</head>
<body class="p-2 md:p-4">

    <div id="loadingScreen">Đang tải dữ liệu từ Cloud... ☁️</div>
    <div id="cloudStatus">Đã đồng bộ ☁️</div>

    <h2 class="text-3xl font-bold text-center text-indigo-700 mt-2 mb-4">Hệ Thống Quản Lý Tín Dụng & Lô Đề</h2>

    <div class="flex justify-center items-center gap-3 mb-6">
        <label class="font-bold text-indigo-800 text-lg">Ngày chốt sổ:</label>
        <input id="sessionDate" type="date" class="p-2 border border-indigo-400 rounded font-bold shadow-inner" />
    </div>

    <div class="max-w-6xl mx-auto tab-container">
        <div class="tab">
            <button class="tablinks active" id="btnTabTongHop" onclick="openTab(event, 'TongHop')">1. Sổ Khách (Tổng Nợ)</button>
            <button class="tablinks" id="btnTabTinhToan" onclick="openTab(event, 'TinhToan')">2. Tính Toán & Vào Sổ</button>
            <button class="tablinks" id="btnTabChiTiet" onclick="openTab(event, 'ChiTiet')">3. Sổ Chi Tiết</button>
        </div>

        <div id="TongHop" class="tabcontent" style="display: block;">
            <div class="flex flex-wrap gap-2 mb-4">
                <input type="text" id="newUserName" class="p-2 border rounded shadow-sm w-64" placeholder="Nhập tên khách hàng mới...">
                <button class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded" onclick="addNewUser()">+ Thêm Khách Hàng</button>
            </div>
            <div class="table-responsive">
                <table class="debt-table">
                    <thead>
                        <tr>
                            <th style="text-align: left;">Tên Khách Hàng</th>
                            <th>Tổng Nợ Hiện Tại (VNĐ)</th>
                        </tr>
                    </thead>
                    <tbody id="tongHopBody"></tbody>
                </table>
            </div>
        </div>

        <div id="TinhToan" class="tabcontent">
            <div class="bg-indigo-50 border border-indigo-200 p-4 rounded-lg mb-4 flex flex-wrap items-center gap-4 shadow-sm">
                <div class="w-full">
                    <label class="block font-bold text-indigo-800 mb-1">CHỌN KHÁCH HÀNG:</label>
                    <select id="customerSelector" class="w-full p-2 border border-indigo-300 rounded font-bold text-lg shadow-inner"></select>
                </div>
            </div>

            <div id="config-panel" class="mb-6 p-4 rounded-lg bg-gray-50 border border-gray-200">
                <div class="flex justify-between items-center mb-3">
                    <p id="configCustomerNote" class="text-sm font-bold text-indigo-700">Cấu hình giá và trả thưởng:</p>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="isCompanyConfig" class="sr-only peer">
                        <div class="w-9 h-5 bg-gray-300 rounded-full peer peer-checked:bg-red-600 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-full"></div>
                        <span class="ml-2 text-sm font-bold text-red-700 uppercase">Khách này là CÔNG TY</span>
                    </label>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-white p-3 rounded border">
                        <label class="block text-xs font-bold text-red-600 uppercase mb-1">Giá Đánh (đ/n)</label>
                        <div class="grid grid-cols-5 gap-1">
                            <input id="pricePerDiem" type="number" placeholder="Lô" class="border p-1 text-center text-sm rounded">
                            <input id="pricePerDeUnit" type="number" placeholder="Đề" class="border p-1 text-center text-sm rounded">
                            <input id="pricePer3CUnit" type="number" placeholder="3C" class="border p-1 text-center text-sm rounded">
                            <input id="pricePerX2Unit" type="number" placeholder="X2" class="border p-1 text-center text-sm rounded">
                            <input id="pricePerX3Unit" type="number" placeholder="X3" class="border p-1 text-center text-sm rounded">
                        </div>
                    </div>
                    <div class="bg-white p-3 rounded border">
                        <label class="block text-xs font-bold text-green-600 uppercase mb-1">Trả thưởng (Tỷ lệ)</label>
                        <div class="grid grid-cols-5 gap-1">
                            <input id="lottoPayout" type="number" class="border p-1 text-center text-sm rounded">
                            <input id="dePayout" type="number" class="border p-1 text-center text-sm rounded">
                            <input id="payoutRatio3C" type="number" class="border p-1 text-center text-sm rounded">
                            <input id="payoutRatioX2" type="number" class="border p-1 text-center text-sm rounded">
                            <input id="payoutRatioX3" type="number" class="border p-1 text-center text-sm rounded">
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="font-bold mb-1 block text-gray-700 uppercase text-xs">Lệnh cược:</label>
                    <textarea id="master-input" rows="8" class="w-full p-3 border rounded mono shadow-inner bg-yellow-50 focus:bg-white" placeholder="Nhập tin nhắn khách..."></textarea>
                </div>
                <div>
                    <label class="font-bold mb-1 block text-gray-700 uppercase text-xs">Kết quả (Bộ nhớ theo ngày):</label>
                    <textarea id="results-input" rows="8" class="w-full p-3 border rounded mono shadow-inner" placeholder="Dán 27 giải vào đây..."></textarea>
                </div>
            </div>

            <button id="calculate-button" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded shadow-lg text-lg mb-4">PHÂN TÍCH & TÍNH TOÁN</button>

            <div id="results-container" class="mb-4"></div>

            <div class="bg-gray-100 border rounded-lg p-4 mb-4 shadow-sm">
                <div class="flex justify-between text-lg"><span class="font-bold">Tổng Nhận:</span> <span id="totalCostOutput" class="font-mono text-red-600">0₫</span></div>
                <div class="flex justify-between text-lg"><span class="font-bold">Tổng Trúng:</span> <span id="totalWinningsOutput" class="font-mono text-green-600">0₫</span></div>
                <div class="flex justify-between text-2xl mt-2 border-top pt-2"><span class="font-black">CHỐT:</span> <span id="totalProfitOutput" class="font-black">0₫</span></div>
            </div>

            <button id="saveToDebtButton" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-lg text-xl shadow-xl">✍️ CHỐT & VÀO SỔ CÔNG NỢ</button>
        </div>

        <div id="ChiTiet" class="tabcontent">
            <div class="flex justify-between mb-4">
                <button class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded shadow" onclick="renderChiTiet()">Hiển thị tất cả sổ</button>
                <div id="userActionButtons"></div>
            </div>
            <div class="table-responsive">
                <table class="debt-table">
                    <thead>
                        <tr>
                            <th style="text-align:left;">Tên Khách Hàng</th>
                            <th>Nợ Cũ (Sửa)</th>
                            <th class="today-col" id="colTodayHeader">Hôm nay</th>
                            <th class="col-total">Tổng Cộng</th>
                            <th class="bg-emerald-100">Xuất TN</th>
                        </tr>
                    </thead>
                    <tbody id="chiTietBody"></tbody>
                </table>
            </div>
            
            <div id="copyNotice" class="hidden mt-4 p-3 bg-emerald-600 text-white font-bold text-center rounded animate-pulse">✅ Đã copy tin nhắn hóa đơn chuẩn form!</div>
        </div>
    </div>

    <script>
        // --- CẤU HÌNH SUPABASE ---
        const { createClient } = supabase;
        const supabaseUrl = 'https://rcndrqiebvdynqrmkamm.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjbmRycWllYnZkeW5xcm1rYW1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3OTA1MDQsImV4cCI6MjA5MTM2NjUwNH0.DZnXTSuGDkgwB8-vZvND7e7XhzTrXrqfVgKeydfYe_c';
        const sb = createClient(supabaseUrl, supabaseKey);

        let creditData = {}; 
        let activeCustomer = '';
        const basePrice = { lo: 22500, de: 1000, c3: 1000, x2: 1000, x3: 1000, payLo: 80000, payDe: 80000, pay3C: 400, payX2: 10, payX3: 40, isCompany: false };

        function debounce(fn, delay) { let t; return function(...args){ clearTimeout(t); t = setTimeout(()=>fn.apply(this,args), delay); }; }

        // --- ĐỒNG BỘ DỮ LIỆU ---
        async function syncData() {
            const status = document.getElementById('cloudStatus');
            status.style.display = 'block';
            const { error } = await sb.from('nhat_ky_cong_no').update({ du_lieu: creditData }).eq('id', 1);
            if(!error) setTimeout(() => status.style.display = 'none', 2000);
        }
        const debouncedSave = debounce(syncData, 1000);

        // --- XỬ LÝ SỰ KIỆN GIAO DIỆN ---
        document.getElementById('sessionDate').value = new Date().toLocaleDateString('en-CA');

        function handleDateChange() {
            const d = document.getElementById('sessionDate').value;
            document.getElementById('results-input').value = creditData['__results__']?.[d] || '';
            switchCustomerContext(activeCustomer);
            renderChiTiet();
            calculateAndRender();
        }

        document.getElementById('sessionDate').onchange = handleDateChange;

        document.getElementById('results-input').oninput = function() {
            const d = document.getElementById('sessionDate').value;
            if(!creditData['__results__']) creditData['__results__'] = {};
            creditData['__results__'][d] = this.value;
            debouncedSave();
            calculateAndRender();
        };

        document.getElementById('master-input').oninput = function() {
            const d = document.getElementById('sessionDate').value;
            if(activeCustomer && creditData[activeCustomer]) {
                creditData[activeCustomer].inputs[d] = this.value;
                debouncedSave();
            }
        };

        // --- HÀM TÍNH TOÁN (LÀM TRÒN NHÀ CÁI) ---
        function runCoreMath(input, result, p) {
            const resClean = result.replace(/[^\d\s]/g, ' ');
            const tokens = resClean.trim().split(/\s+/).filter(t => t.length >= 2);
            let allNums = [];
            tokens.forEach(t => {
                if (t.length >= 8) { for(let i=0; i<t.length; i+=Math.floor(t.length/2)) allNums.push(t.slice(i, i+5)); }
                else allNums.push(t);
            });
            const deRes = (allNums.find(t=>t.length>=4)||allNums[0]||'').slice(-2);
            const loHits = {}; allNums.forEach(n => { const l = n.slice(-2); if(l.length===2) loHits[l] = (loHits[l]||0)+1; });

            let sLoG=0, sDeG=0, sLoW=0, sDeW=0;
            let detailW = {};

            const lines = input.toLowerCase().split('\n');
            lines.forEach(line => {
                let match = line.match(/(.+?)\s*(?:x|X|×|\*)\s*(\d+)/);
                if(match) {
                    let nums = match[1].match(/\d+/g) || [];
                    let qty = parseInt(match[2]);
                    if(line.includes('de') || line.includes('đề')) {
                        sDeG += nums.length * qty;
                        nums.forEach(n => { if(n.slice(-2) === deRes) sDeW += qty; });
                    } else {
                        sLoG += nums.length * qty;
                        nums.forEach(n => { 
                            let h = loHits[n.slice(-2)] || 0; 
                            if(h > 0) { sLoW += h * qty; detailW[n.slice(-2)] = (detailW[n.slice(-2)]||0) + h; }
                        });
                    }
                }
            });

            let cost = Math.ceil((sLoG * p.lo + sDeG * p.de)/1000)*1000;
            let win = Math.floor((sLoW * p.payLo + sDeW * p.payDe)/1000)*1000;
            return { cost, win, net: win - cost, sLoG, sDeG, sLoW, sDeW, detailW };
        }

        function calculateAndRender() {
            const input = document.getElementById('master-input').value;
            const result = document.getElementById('results-input').value;
            const p = creditData[activeCustomer]?.config || basePrice;
            const calc = runCoreMath(input, result, p);
            currentCalcData = calc;

            let loDet = Object.entries(calc.detailW).map(([n,h])=>h>1?`${n}(x${h})`:n).join(' ');
            document.getElementById('totalCostOutput').innerText = formatVND(calc.cost);
            document.getElementById('totalWinningsOutput').innerText = formatVND(calc.win);
            document.getElementById('totalProfitOutput').innerText = formatVND(Math.abs(calc.net));
            document.getElementById('totalProfitOutput').style.color = calc.net >= 0 ? 'green' : 'red';
            
            document.getElementById('results-container').innerHTML = calc.win > 0 ? 
                `<div class="bg-green-50 p-3 rounded border border-green-200 text-sm"><b>Trúng Lô:</b> ${calc.sLoW}đ [${loDet}]</div>` : '';
        }

        // --- XUẤT TIN NHẮN TỪ TAB 3 ---
        function exportTN(name) {
            const d = document.getElementById('sessionDate').value;
            const input = creditData[name]?.inputs?.[d] || '';
            const result = creditData['__results__']?.[d] || '';
            const p = creditData[name]?.config || basePrice;
            const c = runCoreMath(input, result, p);

            const parts = d.split('-');
            let msg = `Ngay: ${parts[2]}-${parts[1]}-${parts[0]}\n`;
            if(c.sLoG > 0) msg += `Lo: ${c.sLoG}d = ${(c.sLoG * p.lo / 1000).toLocaleString()}n\n`;
            if(c.sDeG > 0) msg += `De: ${c.sDeG}n = ${(c.sDeG * p.de / 1000).toLocaleString()}n\n`;
            if(c.sLoW > 0) msg += `Th lo: ${c.sLoW}d [${Object.keys(c.detailW).join(' ')}] = ${(c.sLoW * p.payLo / 1000).toLocaleString()}n\n`;
            if(c.sDeW > 0) msg += `Th de: ${c.sDeW}n = ${(c.sDeW * p.payDe / 1000).toLocaleString()}n\n`;
            
            msg += `Hom nay : ${c.net >= 0 ? `(duong) ${(c.net/1000).toLocaleString()}` : `(am) ${(Math.abs(c.net)/1000).toLocaleString()}`}n\n`;
            
            let oldD = 0;
            for(let k in creditData[name].debts) if(k !== d) oldD += creditData[name].debts[k];
            msg += `No cu: ${oldD >= 0 ? '' : '-'}${Math.abs(oldD).toLocaleString()}n\n`;
            
            let final = oldD + (c.net/1000);
            msg += `Tong: ${c.net/1000 >= 0 ? '' : '-'}${Math.abs(c.net/1000).toLocaleString()} + (${oldD >= 0 ? '' : '-'}${Math.abs(oldD).toLocaleString()}) = ${final >= 0 ? '' : '-'}${Math.abs(final).toLocaleString()}n.`;

            const area = document.getElementById('hiddenCopyArea');
            area.value = msg; area.select(); document.execCommand('copy');
            
            const notice = document.getElementById('copyNotice');
            notice.classList.remove('hidden');
            setTimeout(() => notice.classList.add('hidden'), 2500);
        }

        // --- CÁC HÀM KHỞI TẠO KHÁC ---
        function switchCustomerContext(name) {
            const d = document.getElementById('sessionDate').value;
            if(activeCustomer && creditData[activeCustomer]) creditData[activeCustomer].inputs[d] = document.getElementById('master-input').value;
            activeCustomer = name;
            document.getElementById('lblActiveUser').innerText = name || "KHÁCH VÃNG LAI";
            const input = document.getElementById('master-input');
            
            if(name && creditData[name]) {
                if(creditData[name].config?.isCompany) {
                    let total = "";
                    for(let k in creditData) if(k!=='__results__' && k!=='__default_config__' && k!==name && !creditData[k].config?.isCompany) total += (creditData[k].inputs?.[d] || "") + "\n";
                    input.value = total.trim();
                } else {
                    input.value = creditData[name].inputs?.[d] || '';
                }
                applyCustomerConfig(name);
            } else { input.value = ''; }
            calculateAndRender();
        }

        function applyCustomerConfig(name) {
            const cfg = creditData[name]?.config || creditData['__default_config__'] || basePrice;
            document.getElementById('pricePerDiem').value = cfg.lo;
            document.getElementById('pricePerDeUnit').value = cfg.de;
            document.getElementById('pricePer3CUnit').value = cfg.c3;
            document.getElementById('pricePerX2Unit').value = cfg.x2;
            document.getElementById('pricePerX3Unit').value = cfg.x3;
            document.getElementById('lottoPayout').value = cfg.payLo;
            document.getElementById('dePayout').value = cfg.payDe;
            document.getElementById('payoutRatio3C').value = cfg.pay3C;
            document.getElementById('payoutRatioX2').value = cfg.payX2;
            document.getElementById('payoutRatioX3').value = cfg.payX3;
            document.getElementById('isCompanyConfig').checked = cfg.isCompany || false;
        }

        function renderTongHop() {
            const body = document.getElementById('tongHopBody'); body.innerHTML = '';
            for(let name in creditData) {
                if(name.startsWith('__')) continue;
                let total = 0; for(let k in creditData[name].debts) total += creditData[name].debts[k];
                let tr = document.createElement('tr');
                tr.innerHTML = `<td class="col-name" onclick="goToDetail('${name}')">${name}</td><td class="font-bold ${total>=0?'text-green-600':'text-red-600'}">${(total*1000).toLocaleString()} đ</td>`;
                body.appendChild(tr);
            }
            populateSelectors();
        }

        function populateSelectors() {
            const sel = document.getElementById('customerSelector'); sel.innerHTML = '<option value="">-- Chọn khách --</option>';
            const quick = document.getElementById('quickSelectContacts'); quick.innerHTML = '';
            for(let name in creditData) {
                if(name.startsWith('__')) continue;
                sel.innerHTML += `<option value="${name}">${name}</option>`;
                let span = document.createElement('span');
                span.className = "bg-white border px-3 py-1 rounded-full text-sm cursor-pointer hover:bg-indigo-600 hover:text-white";
                span.innerText = name; span.onclick = () => { sel.value = name; switchCustomerContext(name); };
                quick.appendChild(span);
            }
        }

        function renderChiTiet() {
            const body = document.getElementById('chiTietBody'); body.innerHTML = '';
            const d = document.getElementById('sessionDate').value;
            for(let name in creditData) {
                if(name.startsWith('__')) continue;
                let old = 0; for(let k in creditData[name].debts) if(k!==d) old += creditData[name].debts[k];
                let today = creditData[name].debts[d] || 0;
                let tr = document.createElement('tr');
                tr.innerHTML = `<td class="font-bold text-left">${name}</td>
                    <td>${(old*1000).toLocaleString()}</td>
                    <td><input type="number" value="${today}" onchange="updateDebt('${name}','${d}',this.value)" class="day-input"></td>
                    <td class="font-bold">${((old+today)*1000).toLocaleString()}</td>
                    <td><button onclick="exportTN('${name}')" class="bg-emerald-600 text-white px-2 py-1 rounded text-xs">Xuất TN</button></td>`;
                body.appendChild(tr);
            }
        }

        function updateDebt(name, day, val) {
            creditData[name].debts[day] = parseFloat(val) || 0;
            debouncedSave(); renderTongHop();
        }

        function saveToDebt() {
            if(!activeCustomer || !currentCalcData) return;
            const d = document.getElementById('sessionDate').value;
            creditData[activeCustomer].debts[d] = currentCalcData.net / 1000;
            syncData(); renderTongHop(); renderChiTiet();
            alert("✅ Đã lưu vào sổ!");
        }

        function addNewUser() {
            let n = document.getElementById('newUserName').value.trim();
            if(!n || creditData[n]) return;
            creditData[n] = { debts: {}, config: {...(creditData['__default_config__']||basePrice)}, inputs: {} };
            syncData(); document.getElementById('newUserName').value = ''; renderTongHop();
        }

        function openTab(evt, name) {
            let content = document.getElementsByClassName("tabcontent");
            for (let i = 0; i < content.length; i++) content[i].style.display = "none";
            let links = document.getElementsByClassName("tablinks");
            for (let i = 0; i < links.length; i++) links[i].className = links[i].className.replace(" active", "");
            document.getElementById(name).style.display = "block";
            if(evt) evt.currentTarget.className += " active";
        }

        function goToDetail(name) { document.getElementById('btnTabChiTiet').click(); renderChiTiet(); }
        
        loadDataFromSupabase();
    </script>
</body>
</html>
